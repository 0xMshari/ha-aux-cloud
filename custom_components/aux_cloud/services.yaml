get_power_consumption:
  name: Get power consumption
  description: >-
    Query power consumption (kWh) for a device over any date range.
    Returns total usage and per-bucket values for the requested period.
  fields:
    device_id:
      name: Device ID
      description: The AUX Cloud endpoint ID of the device.
      required: true
      example: "00000000000000000000907abe09717d"
      selector:
        text:
    start_date:
      name: Start date
      description: First day of the period (YYYY-MM-DD).
      required: true
      example: "2026-06-01"
      selector:
        date:
    end_date:
      name: End date
      description: Last day of the period (YYYY-MM-DD).
      required: true
      example: "2026-06-26"
      selector:
        date:
    report_type:
      name: Report type
      description: >-
        Optional bucket size (day, month, year). When omitted, the best
        granularity is chosen automatically from the date range.
      required: false
      example: day
      selector:
        select:
          options:
            - day
            - month
            - year
