get_power_consumption:
  name: Get energy consumption
  description: >-
    Query energy consumption (kWh) for one device over any date range.
    Accepts any start/end dates (YYYY-MM-DD). Returns the total and per-bucket
    values without changing the sensor period.
  fields:
    device_id:
      name: Device ID
      description: The AUX Cloud endpoint ID of the device.
      required: true
      example: "00000000000000000000907abe09717d"
      selector:
        text:
    start_date:
      name: Start date
      description: First day of the period. Any calendar date is accepted.
      required: true
      example: "2026-06-01"
      selector:
        date:
    end_date:
      name: End date
      description: Last day of the period. Any calendar date is accepted.
      required: true
      example: "2026-06-26"
      selector:
        date:
    report_type:
      name: Report type
      description: >-
        Optional bucket size (day, month, year). When omitted, the best
        granularity is chosen automatically from the date range.
      required: false
      example: day
      selector:
        select:
          options:
            - day
            - month
            - year

set_power_consumption_period:
  name: Set energy consumption period
  description: >-
    Set the date range used by all Energy Consumption sensors, then refresh them.
    Accepts any start/end dates (YYYY-MM-DD).
  fields:
    start_date:
      name: Start date
      description: First day of the period. Any calendar date is accepted.
      required: true
      example: "2026-06-01"
      selector:
        date:
    end_date:
      name: End date
      description: Last day of the period. Any calendar date is accepted.
      required: true
      example: "2026-06-26"
      selector:
        date:
